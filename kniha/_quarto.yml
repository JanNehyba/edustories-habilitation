# P8 (habilitace-2) — Quarto book, POUZE ČESKY (rozhodnutí Jana 15. 7. 2026;
# jediný EN text knihy je povinný Abstract ve front matter). build.sh staguje
# kapitoly/cs/ do tohoto adresáře a stripuje redakční metadata/checklisty.
project:
  type: book
  output-dir: ../vystupy/export

book:
  title: "Náročné chování žáků v době AI"
  subtitle: "Kazuistiky z praxe a jazykové modely v pedagogickém výzkumu"
  author: "Jan Nehyba"
  date: "2026"
  output-file: "habilitace2-CZ"
  chapters:
    - index.md
    - 01-introduction.md
    - part: "Východiska"
      chapters:
        - 02-theoretical-foundations.md
        - 03-edustories-context.md
        - 04-methodology.md
    - part: "Empirické studie"
      chapters:
        - 05-study1-corpus.md
        - 06-study2-coding.md
        - 07-study3-ai-vs-teacher.md
        # - 08-study4-quality.md      # doplní se po K3 freeze (J4)
    # - part: "Integrace"            # doplní se po empirii (F6)
    #   chapters:
    #     - 09-discussion.md
    #     - 10-conclusion.md
    - 99-references.md
  appendices:
    - appendix-A-coding-manuals.md
    - appendix-B-prompts.md
    - appendix-C-supplementary-tables.md
    - appendix-D-ethics.md

date-format: "YYYY"
lang: cs

filters:
  - partials/visible-external-links.lua

format:
  docx:
    toc: true
    toc-depth: 2
    number-sections: false   # kapitoly nesou čísla v nadpisech samy
  pdf:
    documentclass: scrbook
    pdf-engine: tectonic
    papersize: a4
    linestretch: 1.5   # SD PdF 2/2021 Čl. 6(2): řádkování 1,5–2
    number-sections: false
    mainfont: "STIX Two Text"
    mathfont: "STIX Two Math"
    sansfont: "Arial"
    monofont: "Menlo"
    include-in-header:
      - partials/muni-titlepage-cs.tex   # titulka dle Vzoru MU (metadata výše)
    header-includes:
      - |-
        \setlength{\emergencystretch}{3em}
        \raggedbottom
        \renewcommand{\topfraction}{0.85}
        \renewcommand{\bottomfraction}{0.6}
        \renewcommand{\textfraction}{0.1}
        \renewcommand{\floatpagefraction}{0.75}
        \usepackage{newunicodechar}
        \newunicodechar{→}{\ensuremath{\rightarrow}}
        \newunicodechar{↔}{\ensuremath{\leftrightarrow}}
        \newunicodechar{≈}{\ensuremath{\approx}}
        \newunicodechar{≤}{\ensuremath{\leq}}
        \newunicodechar{≥}{\ensuremath{\geq}}
        \newunicodechar{≠}{\ensuremath{\neq}}
        \newunicodechar{×}{\ensuremath{\times}}
        \newunicodechar{∧}{\ensuremath{\wedge}}
        % pracovní markery zdrojů (nemají glyf ve STIX): sadit čitelně
        \newunicodechar{❓}{\textbf{(?)}}
        \newunicodechar{⚠}{\textbf{(!)}}
        % JEDNOTNÝ STYL knihy: nadpisy MUNI modře (viz kniha/GRAFICKY-MANUAL.md)
        \usepackage{xcolor}
        \usepackage[normalem]{ulem}
        \definecolor{MUNIblue}{HTML}{0000DC}
        \definecolor{PdFOrange}{HTML}{FF7300}
        \AtBeginDocument{\hypersetup{colorlinks=true,urlcolor=MUNIblue,linkcolor=black,citecolor=black,filecolor=MUNIblue}}
        \addtokomafont{part}{\color{MUNIblue}}
        \addtokomafont{chapter}{\color{MUNIblue}}
        \addtokomafont{section}{\color{MUNIblue}}
        \addtokomafont{subsection}{\color{MUNIblue}}
        \addtokomafont{partentry}{\color{black}}
        \addtokomafont{chapterentry}{\color{black}}
    toc: true
    keep-tex: false
